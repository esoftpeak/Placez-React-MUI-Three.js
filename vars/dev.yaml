fullnameOverride: "placez-app"

image:
    # -- Image to use for deploying, must support an entrypoint which creates users/databases from appropriate config files
    # -- The container image repository that should be used.  E.g 'nginx', 'gcr.io/kubernetes-helm/tiller'.
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "latest"
replicaCount: 1

nodeSelector:
  agentpool: application

## Istio virtual service and gateway configurations.
istio:
  enabled: true
  gateway:
    names:
    - 'istio-ingress/istio-ingressgateway-https-horizoncloud'
  virtualService:
    hosts:
    # - #{PlacezApiDomain}#
    - placez-dev.horizoncloud.com
    # - dev-placez.horizoncloud.com

volume:
  enabled: false
  mountPath: "/usr/share/nginx/html/config.js"
  subPath: config.js
  configMap:
    name: placez-ui-config

securityContext:
 allowPrivilegeEscalation: false
 capabilities:
  drop: ["ALL"]
  add: ["NET_BIND_SERVICE", "CHOWN", "SETGID", "SETUID"]

lifecycle:
  preStop:
    exec:
      command: ["sleep", "90"]
    
terminationGracePeriodSeconds: 101

job:
 enabled: false

service:
  targetPort: 80

# #job for dbmigrator
# job:
#  enabled: true
#  image:
#   repository: nginx
#   tag: "latest"
#  volume:
#   enabled: true
#   mountPath: "/app/appsettings.json"
#   subPath: appsettings.json
#   configMap:
#     name: placez-api-settings

resource: 
  enabled: true
resources: 
  limits:
    cpu: 200m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi
  
ingress:    
  enabled: true 
  annotations: 
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/connection-draining: "true"
    appgw.ingress.kubernetes.io/connection-draining-timeout: "30"
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-dev
  hosts:                        
    - host: placez-dev.horizoncloud.com
      paths:
        - path: /
          pathType: ImplementationSpecific

  tls: 
   - secretName: horizoncloud.com-wildcard-tls
     hosts:
       - placez-dev.horizoncloud.com