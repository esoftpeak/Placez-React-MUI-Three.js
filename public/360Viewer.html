<!doctype html>
<html lang="en">
  <head>
    <title>Placez Photosphere</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"
    />
    <link type="text/css" rel="stylesheet" href="main.css" />
    <style>
      body {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import * as THREE from 'https://cdn.skypack.dev/three@0.133/build/three.module.js';

      let camera, scene, renderer;

      let isUserInteracting = false,
        onPointerDownMouseX = 0,
        onPointerDownMouseY = 0,
        lon = 0,
        onPointerDownLon = 0,
        lat = 0,
        onPointerDownLat = 0,
        phi = 0,
        theta = 0;

      const loaderMaterial = new THREE.MeshBasicMaterial({
        color: 0x5c236f,
        wireframe: true,
      });
      const loaderGeometry = new THREE.SphereGeometry(100, 64, 64);
      const loaderMesh = new THREE.Mesh(loaderGeometry, loaderMaterial);
      const rotationQuaternion = new THREE.Quaternion().setFromAxisAngle(
        new THREE.Vector3(0, 1, 0),
        5
      );
      let loading = true;

      init();
      animate();

      function init() {
        const container = document.body;

        camera = new THREE.PerspectiveCamera(
          75,
          window.innerWidth / window.innerHeight,
          1,
          100
        );

        scene = new THREE.Scene();
        const ambientLight = new THREE.AmbientLight(0xffffff, 1);

        scene.add(ambientLight);

        scene.add(loaderMesh);

        const geometry = new THREE.SphereGeometry(50, 60, 40);
        // invert the geometry on the x-axis so that all of the faces point inward
        geometry.scale(-1, 1, 1);
        const hash = window.location.href.split('#')[1] || '';

        const envElement = document.getElementById('env-value');
        const url = window.location;
        const urlObject = new URL(url);
        const photosphereUrl = urlObject.searchParams.get('src');

        const texture = new THREE.TextureLoader().load(
          photosphereUrl,
          () => {
            scene.remove(loaderMesh);
            loading = false;
            update();
          }
        );
        const material = new THREE.MeshStandardMaterial({
          map: texture,
        });

        const mesh = new THREE.Mesh(geometry, material);

        scene.add(mesh);

        renderer = new THREE.WebGLRenderer();
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);

        document.body.appendChild(renderer.domElement);

        container.style.touchAction = 'none';
        container.addEventListener('pointerdown', onPointerDown);

        document.addEventListener('wheel', onDocumentMouseWheel);

        //

        document.addEventListener('dragover', function (event) {
          event.preventDefault();
          event.dataTransfer.dropEffect = 'copy';
        });

        document.addEventListener('dragenter', function () {
          document.body.style.opacity = 0.5;
        });

        document.addEventListener('dragleave', function () {
          document.body.style.opacity = 1;
        });

        // Drag and Drop Debug

        // document.addEventListener( 'drop', function ( event ) {

        // 	event.preventDefault();

        // 	const reader = new FileReader();
        // 	reader.addEventListener( 'load', function ( event ) {

        //     const textureLoader = new THREE.TextureLoader();
        // 		material.map = textureLoader.load(event.target.result);
        // 		material.map.needsUpdate = true;

        // 	} );
        // 	reader.readAsDataURL( event.dataTransfer.files[ 0 ] );

        // 	document.body.style.opacity = 1;

        // } );

        window.addEventListener('resize', onWindowResize);
      }

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();

        renderer.setSize(window.innerWidth, window.innerHeight);

        update();
      }

      function onPointerDown(event) {
        if (event.isPrimary === false) return;

        isUserInteracting = true;

        onPointerDownMouseX = event.clientX;
        onPointerDownMouseY = event.clientY;

        onPointerDownLon = lon;
        onPointerDownLat = lat;

        document.addEventListener('pointermove', onPointerMove);
        document.addEventListener('pointerup', onPointerUp);
      }

      function onPointerMove(event) {
        if (event.isPrimary === false) return;

        lon = (onPointerDownMouseX - event.clientX) * 0.1 + onPointerDownLon;
        lat = (event.clientY - onPointerDownMouseY) * 0.1 + onPointerDownLat;
      }

      function onPointerUp() {
        if (event.isPrimary === false) return;

        isUserInteracting = false;

        document.removeEventListener('pointermove', onPointerMove);
        document.removeEventListener('pointerup', onPointerUp);
      }

      function onDocumentMouseWheel(event) {
        const fov = camera.fov + event.deltaY * 0.05;

        camera.fov = THREE.MathUtils.clamp(fov, 10, 75);

        camera.updateProjectionMatrix();

        update();
      }

      function animate() {
        requestAnimationFrame(animate);
        if (loading) {
          loaderMesh.applyQuaternion(rotationQuaternion);
          update();
        }
        if (isUserInteracting) {
          update();
        }
      }

      function update() {
        if (isUserInteracting === false) {
          lon += 0.1;
        }

        lat = Math.max(-85, Math.min(85, lat));
        phi = THREE.MathUtils.degToRad(90 - lat);
        theta = THREE.MathUtils.degToRad(lon);

        const x = 500 * Math.sin(phi) * Math.cos(theta);
        const y = 500 * Math.cos(phi);
        const z = 500 * Math.sin(phi) * Math.sin(theta);

        camera.lookAt(x, y, z);
        loaderMesh.position.set(x, y, z);

        renderer.render(scene, camera);
      }

      function updateRender() {
        renderer.render(scene, camera);
      }
    </script>
  </body>
</html>
