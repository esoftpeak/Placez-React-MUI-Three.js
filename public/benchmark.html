<!doctype html>
<html lang="en">
  <head>
    <!-- <link rel="shortcut icon" href="favicon.ico" /> -->
    <meta charset="utf-8" />
    <title>Benchmark</title>
    <style>
      body {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import * as THREE from 'https://cdn.skypack.dev/three@0.133/build/three.module.js';
      import { TextGeometry } from 'https://cdn.skypack.dev/three@0.133/examples/jsm/geometries/TextGeometry.js';
      import { FontLoader } from 'https://cdn.skypack.dev/three@0.133/examples/jsm/loaders/FontLoader.js';

      const StressTest = function (containerElement) {
        const loader = new FontLoader();
        let camera;
        let scene;
        let renderer;
        let light;
        const cameraPivot = new THREE.Object3D();
        let geometry;
        let material;
        const clock = new THREE.Clock(true);
        const fpsSum = 0;
        const runningFrames = [];
        const numberOfFrames = 120;
        let count = 0;
        let request;
        let threeFont;
        let items = new THREE.Object3D();

        this.item = undefined;
        this.materialsBak = [];

        loader.load(`helvetiker_regular.typeface.json`, (font) => {
          threeFont = font;

          geometry = new TextGeometry('Placez', {
            font,
            size: 20,
            depth: 4,
            curveSegments: 12,
            bevelEnabled: true,
            bevelThickness: 2,
            bevelSize: 0,
            bevelOffset: 0,
            bevelSegments: 5,
          });

          material = new THREE.MeshStandardMaterial({
            color: 0x5c236f,
          });
        });

        const init = () => {
          scene = new THREE.Scene();

          scene.add(cameraPivot);
          scene.add(items);
          camera = new THREE.PerspectiveCamera(
            45,
            containerElement.clientWidth / containerElement.clientHeight,
            1,
            1000
          );
          camera.position.set(-250, 0, 0);
          cameraPivot.add(camera);
          camera.lookAt(cameraPivot.position);
          light = new THREE.HemisphereLight(0xffffff, 0x999999);
          scene.add(light);
          // light = new THREE.DirectionalLight(0xffffff);
          light.position.set(0, -500, 100);
          scene.add(light);

          renderer = new THREE.WebGLRenderer({
            preserveDrawingBuffer: true,
            alpha: true,
            antialias: true,
          });
          renderer.setSize(
            containerElement.clientWidth,
            containerElement.clientHeight
          );

          containerElement.appendChild(renderer.domElement);

          // controls = new OrbitControls(camera, renderer.domElement);
          // controls.target.set(0, 0, 0);
          // controls.update();
        };

        init();
        clock.getDelta();
        animate();

        function randPos() {
          const x = 600;
          return Math.random() * x - x / 2;
        }

        function addLogo() {
          const mesh = new THREE.Mesh(geometry, material);
          mesh.position.set(randPos(), randPos(), randPos());
          items.add(mesh);
        }

        function average(arr) {
          return arr.reduce((a, b) => a + b, 0) / arr.length;
        }

        function determineResponse(numberOfObjects) {
          if (numberOfObjects < 500) {
            return 'We recommend you explore a free trial of 2D Placez';
          } else if (numberOfObjects < 1000) {
            return 'The best experience on your device will be in 2D Placez';
          } else {
            return 'Your device can run the best Placez has to offer';
          }
        }

        function animate() {
          cameraPivot.rotateOnWorldAxis(
            new THREE.Vector3(0, 1, 0),
            Math.PI / 180
          );

          if (
            average(runningFrames) > 30 ||
            runningFrames.length < numberOfFrames
          ) {
            for (let index = 0; index <= Math.ceil(count / 50); index++) {
              addLogo();
            }
            request = requestAnimationFrame(animate);
            renderer.render(scene, camera);
            const fps = 1 / clock.getDelta();
            count++;
            if (runningFrames.length === numberOfFrames) {
              if (count % 200 === 0) {
                console.log('objects', items.children.length);
                console.log('fps', average(runningFrames));
              }
              runningFrames.shift();
            }
            runningFrames.push(fps);
          } else {
            const response = determineResponse(items.children.length);
            console.log(items.children.length);
            const completionText = new TextGeometry(`${response}`, {
              font: threeFont,
              size: 7,
              depth: 0.1,
              curveSegments: 12,
              bevelEnabled: false,
              bevelThickness: 0,
              bevelSize: 0,
              bevelOffset: 0,
              bevelSegments: 5,
            });
            scene.remove(items);
            items = new THREE.Object3D();
            scene.add(items);
            renderer.render(scene, camera);
            completionText.center();
            const mesh = new THREE.Mesh(completionText, material);
            items.add(mesh);
            cameraPivot.rotation.set(0, Math.PI / 2, 0);
            renderer.render(scene, camera);
          }
        }

        this.dispose = () => {
          renderer.forceContextLoss();
          renderer.dispose();
          cancelAnimationFrame(request);
        };
      };

      new StressTest(document.body);
    </script>
  </body>
</html>
